name: android

on:
  workflow_dispatch:
  push:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - 'irr/**.[ch]'
      - 'irr/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'po/**.po'
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v7
    
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gettext
        
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
          distribution: 'temurin'
          java-version: '17'
          
    - name: Inject Game, Scale UI, and Erase Names (Luanti & Mineclonia)
      run: |
        # 1. تحميل لعبة ماينكلونيا في مجلد الألعاب الرئيسي
        git clone https://codeberg.org/Mineclonia/Mineclonia.git games/mineclonia
        
        # 2. إجبار المحرك على جعل ماينكلونيا هي اللعبة الافتراضية عند التشغيل
        sed -i 's/"default_game", "[^"]*"/"default_game", "mineclonia"/g' src/defaultsettings.cpp
        
        # 3. مسح اسم ماينكلونيا وجعله فارغاً تماماً في ملف الإعدادات
        sed -i 's/title = Mineclonia/title = ""/g' games/mineclonia/game.conf
        
        # 4. حذف صورة شعار "MINECLONIA" الملونة القديمة تماماً لمنع ظهورها
        rm -f games/mineclonia/menu/header.png
        
        # 5. مسح كلمة Luanti تماماً من أعلى الشاشة بجعل الدالة تعيد نصاً فارغاً
        sed -i '1i function core.get_project_name() return "" end' builtin/mainmenu/init.lua
        
        # 6. تكبير قوائم وأزرار الصفحة الرئيسية لتملأ الشاشة وتصبح مريحة للمس (1.5)
        sed -i 's/"gui_scaling", "[^"]*"/"gui_scaling", "1.5"/g' src/defaultsettings.cpp
        
        # 7. تكبير أزرار التحكم والـ HUD داخل اللعبة أيضاً لتناسب الهواتف بشاشات اللمس
        sed -i 's/"hud_scaling", "[^"]*"/"hud_scaling", "1.5"/g' src/defaultsettings.cpp
        
        # 8. الحقن البرمجي الصارم داخل Gradle لدمج اللعبة بعد تنظيف الأصول وقبل الضغط
        cat << 'EOF' >> android/app/build.gradle

        tasks.matching { it.name == "prepareAssets" }.all {
            doLast {
                copy {
                    from "../../games/mineclonia"
                    into "build/assets/games/mineclonia"
                }
            }
        }
        EOF
        
    - name: Build AAB with Gradle
      run: cd android; ./gradlew bundlerelease
      
    - name: Build APKs with Gradle
      run: cd android; ./gradlew assemblerelease
      
    - name: Save AAB artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-release.aab
        path: android/app/build/outputs/bundle/release/app-release.aab
        
    - name: Save armeabi artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-armeabi-v7a.apk
        path: android/app/build/outputs/apk/release/app-armeabi-v7a-release-unsigned.apk
        
    - name: Save arm64 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-arm64-v8a.apk
        path: android/app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk
        
    - name: Save x86 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-x86.apk
        path: android/app/build/outputs/apk/release/app-x86-release-unsigned.apk
        
    - name: Save x86_64 artifact
      uses: actions/upload-artifact@v7
      with:
        name: Luanti-x86_64.apk
        path: android/app/build/outputs/apk/release/app-x86_64-release-unsigned.apk
