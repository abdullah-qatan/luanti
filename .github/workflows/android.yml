name: Build Custom Luanti Game for Android

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بكبسة زر من موقع GitHub

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود المصدري للمحرك
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. تثبيت الأدوات المساعدة المطلوبة للمحرك (حل مشكلة msgfmt)
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gettext

      # 3. إجبار بيئة جافا (Java JDK 17) على العمل
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 4. خطوة مسح الأسماء بالكامل وتكبير الواجهات
      - name: Inject Game, Scale UI, and Erase Names
        run: |
          # أ. تحميل لعبة ماينكلونيا في مجلد الألعاب الرئيسي
          git clone https://codeberg.org/Mineclonia/Mineclonia.git games/mineclonia
          
          # ب. إجبار المحرك على جعل المجلد الحالي هو اللعبة الافتراضية عند التشغيل
          sed -i 's/"default_game", "[^"]*"/"default_game", "mineclonia"/g' src/defaultsettings.cpp
          
          # ج. مسح اسم ماينكلونيا وجعله فارغاً تماماً (بدون اسم) في ملف الإعدادات
          sed -i 's/title = Mineclonia/title = ""/g' games/mineclonia/game.conf
          
          # د. حذف صورة شعار "MINECLONIA" الملونة القديمة تماماً لضمان عدم ظهورها
          rm -f games/mineclonia/menu/header.png
          
          # هـ. مسح كلمة Luanti تماماً من أعلى الشاشة بجعل الدالة تعيد نصاً فارغاً
          sed -i '1i function core.get_project_name() return "" end' builtin/mainmenu/init.lua
          
          # و. تكبير قوائم وأزرار الصفحة الرئيسية لتملأ شاشة أندرويد وتصبح مريحة للمس (1.5)
          sed -i 's/"gui_scaling", "[^"]*"/"gui_scaling", "1.5"/g' src/defaultsettings.cpp
          
          # ز. تكبير أزرار التحكم والـ HUD داخل اللعبة أيضاً لتناسب الهواتف
          sed -i 's/"hud_scaling", "[^"]*"/"hud_scaling", "1.5"/g' src/defaultsettings.cpp
          
          # ح. الحقن البرمجي داخل Gradle لضمان نقل كافة ملفات اللعبة بدون مشاكل
          cat << 'EOF' >> android/app/build.gradle

          tasks.matching { it.name == "prepareAssets" }.all {
              doLast {
                copy {
                    from "../../games/mineclonia"
                    into "build/assets/games/mineclonia"
                }
              }
          }
          EOF

      # 5. إعطاء صلاحيات التشغيل لـ Gradle الخاص بالأندرويد
      - name: Grant Execute Permission for Gradlew
        run: chmod +x android/gradlew

      # 6. بدء عملية بناء حزمة الأندرويد وتجميع ملف الـ APK
      - name: Build APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # 7. رفع ملف الـ APK الناتج للتحميل مباشرة
      - name: Upload Final APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanGame-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
